<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tweeter</title>
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/nav.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/new-tweet.css">
  <link rel="stylesheet" href="styles/tweet.css">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/timeago.js/4.0.2/timeago.min.js"></script>
</head>
<body>
  <!-- Navigation Bar -->
  <nav>
    <div class="nav-content">
      <span class="logo">Tweeter</span>
      <div class="new-tweet-toggle">
        <p>Write a new tweet</p>
        <i class="fas fa-angle-double-down"></i>
      </div>
    </div>
  </nav>

  <!-- Header Section -->
  <header class="profile-header">
    <div class="profile-card">
      <img src="/images/profile-hex.png" alt="Profile Avatar" class="profile-avatar">
      <h2>Alex Smith</h2>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <!-- New Tweet Form -->
    <section class="new-tweet">
      <h2>Compose Tweet</h2>
      <div id="error-message" class="hidden"></div>
      <form action="/tweets/" method="POST">
        <label for="tweet-text">What are you humming about?</label>
        <textarea id="tweet-text" name="text" placeholder="What are you humming about?"></textarea>
        <div class="form-footer">
          <button type="submit">Tweet</button>
          <output name="counter" class="counter" for="tweet-text">140</output>
        </div>
      </form>
    </section>

    <!-- Tweets Container -->
    <section id="tweets-container">
      <!-- Example tweet structure -->
      <article class="tweet">
        <header>
          <div class="user-info">
            <img src="/images/user-avatar.png" alt="User Avatar">
            <div>
              <h3 class="user-name">@username</h3>
              <p class="user-handle">@handle · <time datetime="2024-12-17T10:00:00Z">2 hours ago</time></p>
            </div>
          </div>
        </header>
        <p class="tweet-content">This is a sample tweet to demonstrate the layout and styles.</p>
        <footer class="icons">
          <i class="icon-like">👍</i>
          <i class="icon-retweet">🔄</i>
          <i class="icon-flag">🚩</i>
        </footer>
      </article>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="scripts/composer-char-counter.js"></script>
  <script src="scripts/client.js"></script>
</body>
</html>
